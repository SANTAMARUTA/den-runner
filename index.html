<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DENRUNNER - Phase 4.3 (Final Visual Adjustments)</title>
    <style>
        :root {
            --bg-sky: linear-gradient(to bottom, #1e90ff, #87ceeb);
            --fever-bg: linear-gradient(45deg, #ff00ff, #ff8c00, #4b0082);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { 
            width: 100%; height: 100%; overflow: hidden; 
            background: #000; font-family: 'Arial', sans-serif;
            touch-action: none; -webkit-user-select: none; user-select: none;
        }

        #rotate-notice {
            position: fixed; inset: 0; background: #111; color: #fff;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            z-index: 10000; text-align: center; padding: 20px;
        }
        #game-container { position: relative; width: 100vw; height: 100vh; background: var(--bg-sky); overflow: hidden; }

        #game-container.fever-mode { background: var(--fever-bg); animation: fever-flash 0.5s infinite alternate; }
        @keyframes fever-flash { from { filter: hue-rotate(0deg); } to { filter: hue-rotate(90deg); } }

        .layer { position: absolute; top: 0; left: 0; width: 200%; height: 100%; pointer-events: none; }
        #layer-back { background: radial-gradient(circle at 20% 20%, #fff 0%, transparent 10%); opacity: 0.3; }
        #layer-mid { background: repeating-linear-gradient(90deg, transparent 0, transparent 200px, rgba(255,255,255,0.1) 200px, rgba(255,255,255,0.1) 400px); }
        #ground { position: absolute; bottom: 0; width: 200%; height: 15%; background: #5d4037; border-top: 4px solid #8d6e63; z-index: 10; }

        #input-layer { position: absolute; inset: 0; z-index: 1500; }

        #player {
            position: absolute; left: 10%; bottom: 15%; width: 80px; height: 80px; z-index: 100;
            background-color: transparent; background-size: contain; background-repeat: no-repeat; background-position: center;
            transform-origin: center center;
            will-change: transform;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            transform: translateZ(0);
        }

        .player-spin-anim { animation: spin-once 0.35s linear forwards; }
        @keyframes spin-once {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* 主人公フォールバック (透明のまま) */
        .player-fallback { 
            background-color: transparent !important; 
            background-image: none !important;
        }

        .item, .obstacle, .stompEnemy, .flyEnemy, .hole { 
            position: absolute; 
            background-size: contain; 
            background-repeat: no-repeat; 
            background-position: center; 
        }

        .item { width: 45px; height: 45px; z-index: 50; border-radius: 50%; background-color: #ff4081; box-shadow: 0 0 15px #fff; }
        
        /* 敵キャラサイズ再拡大 (Amber指示 ④) */
        .enemy-auto { width: 110px; height: 110px; z-index: 40; }
        .enemy-satoru { width: 115px; height: 100px; z-index: 45; }
        .enemy-arakatsu { width: 105px; height: 85px; z-index: 48; }

        .enemy-auto.fallback-enemy { background-color: #222; border-radius: 5px; }
        .enemy-satoru.fallback-enemy { background-color: #2e7d32; border-radius: 8px; }
        .enemy-arakatsu.fallback-enemy { background-color: #3949ab; border-radius: 50% 50% 10% 10%; }

        .hole { 
            width: 140px; height: 16%; bottom: 0; z-index: 5; 
            background: linear-gradient(to bottom, #1a1a1a, #000);
            border-left: 4px solid #3e2723; border-right: 4px solid #3e2723;
            box-shadow: inset 0 10px 20px rgba(0,0,0,0.8);
        }

        #ui-layer { position: absolute; top: 20px; left: 20px; z-index: 2000; color: #fff; text-shadow: 2px 2px 4px #000; pointer-events: none; }
        .stat-box { font-size: 22px; font-weight: bold; margin-bottom: 5px; }
        #fever-bar-container { width: 200px; height: 15px; background: rgba(0,0,0,0.5); border: 2px solid #fff; border-radius: 10px; }
        #fever-bar { width: 0%; height: 100%; background: linear-gradient(90deg, #ff0, #f0f); transition: width 0.1s linear; }

        #overlay {
            position: absolute; inset: 0; background: rgba(0,0,0,0.7);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 3000; color: #fff; text-align: center; padding: 20px;
        }
        button {
            padding: 15px 45px; font-size: 24px; cursor: pointer; border: none;
            border-radius: 50px; background: #ffeb3b; color: #333; font-weight: bold;
            margin-top: 20px; pointer-events: auto; box-shadow: 0 4px 0 #c4a000;
        }
        button:active { transform: translateY(2px); box-shadow: 0 2px 0 #c4a000; }
    </style>
</head>
<body>

    <div id="rotate-notice">
        <h1>スマホを横向きにしてね！</h1>
        <p style="margin-top:10px;">DENRUNNERは横画面専用です</p>
    </div>

    <div id="game-container">
        <div id="layer-back" class="layer"></div>
        <div id="layer-mid" class="layer"></div>
        <div id="ground"></div>
        <div id="input-layer"></div>

        <div id="player"></div>

        <div id="ui-layer">
            <div class="stat-box">SCORE: <span id="score-val">0</span></div>
            <div id="fever-bar-container"><div id="fever-bar"></div></div>
        </div>

        <div id="overlay">
            <h1 id="msg-title">DENRUNNER</h1>
            <p id="msg-body">
                敵は上から踏んづけよう！<br>
                横からぶつかるとミス！<br>
                落とし穴に気をつけて！
            </p>
            <button id="start-btn">GAME START</button>
        </div>
    </div>

<script>
/**
 * Denrunner: Final Stability Edition (v4.3)
 * 監修: アンバー / 実装: ヘルメス
 * 修正点：
 * 1. setPlayerImage() の early return 条件を緩和 (Amber指示 ①)
 * 2. アイテム（るびぃ）の画像失敗時フォールバック実装 (Amber指示 ②)
 * 3. ゲームオーバー時のBGM完全リセット処理 (Amber指示 ③)
 * 4. 敵サイズをさらに拡大し、当たり判定マージンを最適化 (Amber指示 ④)
 */

const config = {
    gravity: 0.8,
    jumpPower: -16,
    stompBouncePower: -12,
    baseSpeed: 7,
    maxSpeed: 18,
    feverBonus: 8,
    feverDuration: 5000,
    itemInterval: 1200, 
    obsInterval: 2800,
    stompInterval: 3800,
    flyInterval: 4800,
    holeInterval: 6000,
    groundHeight: 15,
    scoreRate: 0.1,
    DEBUG_FORCE_HOLE: false,
    bgmVolume: 0.5
};

const assets = {
    player: 'DENさん走行時.gif',
    playerJump: 'DENさんジャンプ.png',
    playerMiss: 'DENさんクラッシュ.png',
    ruby: 'イザックるびぃ.png',
    enemyAuto: 'オート.png',
    enemySatoru: 'サトルさん.png',
    enemyArakatsu: 'アラカツさん.png',
    bgm: 'DEN RUNNER Main Loop.wav'
};

const assetStatus = {
    player: false,
    playerJump: false,
    playerMiss: false,
    ruby: false,
    enemyAuto: false,
    enemySatoru: false,
    enemyArakatsu: false
};

let feverTimeoutId = null;
let spinTimeoutId = null;
let missTimeoutId = null;
let isLandscape = true;
let gameBgm = null; 
let currentPlayerImageKey = null; 

let state = {
    running: false,
    isMissed: false,
    distance: 0,
    scoreRaw: 0,
    speed: config.baseSpeed,
    isFever: false,
    playerY: 0,
    velocityY: 0,
    jumps: 0,
    feverGauge: 0,
    lastTime: 0,
    itemTimer: 0,
    obsTimer: 0,
    stompTimer: 0,
    flyTimer: 0,
    holeTimer: 0,
    isAboveHole: false,
    firstHoleSpawned: false
};

const el = {
    container: document.getElementById('game-container'),
    input: document.getElementById('input-layer'),
    player: document.getElementById('player'),
    ground: document.getElementById('ground'),
    score: document.getElementById('score-val'),
    feverBar: document.getElementById('fever-bar'),
    overlay: document.getElementById('overlay'),
    startBtn: document.getElementById('start-btn'),
    layerMid: document.getElementById('layer-mid'),
    layerBack: document.getElementById('layer-back'),
    notice: document.getElementById('rotate-notice')
};

function checkOrientation() {
    isLandscape = window.innerWidth > window.innerHeight;
    if (isLandscape) {
        el.notice.style.display = 'none';
        el.container.style.display = 'block';
    } else {
        el.notice.style.display = 'flex';
        el.container.style.display = 'none';
    }
}

function init() {
    window.addEventListener('resize', checkOrientation);
    window.addEventListener('orientationchange', checkOrientation);
    checkOrientation();

    gameBgm = new Audio(assets.bgm);
    gameBgm.loop = true;
    gameBgm.volume = config.bgmVolume;
    gameBgm.addEventListener('error', () => console.warn('BGM load failed:', assets.bgm));

    el.startBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        startGame();
    });
    el.input.addEventListener('pointerdown', handleInput);
    preloadAssets();
}

function preloadAssets() {
    Object.keys(assetStatus).forEach(key => {
        const img = new Image();
        img.src = assets[key];
        img.onload = () => {
            assetStatus[key] = true;
            console.log('loaded:', key, assets[key]);
        };
        img.onerror = () => {
            assetStatus[key] = false;
            console.warn('failed:', key, assets[key]);
        };
    });
}

function startGame() {
    if (state.running) return;

    // 診断ログ
    console.log('--- START GAME ---');
    console.log('player asset loaded =', assetStatus.player);

    if (gameBgm) {
        gameBgm.currentTime = 0;
        gameBgm.volume = config.bgmVolume;
        gameBgm.play().catch(e => console.warn('BGM play blocked:', e));
    }

    if (feverTimeoutId) clearTimeout(feverTimeoutId);
    if (spinTimeoutId) clearTimeout(spinTimeoutId);
    if (missTimeoutId) clearTimeout(missTimeoutId);
    feverTimeoutId = spinTimeoutId = missTimeoutId = null;

    state = {
        running: true,
        isMissed: false,
        distance: 0,
        scoreRaw: 0,
        speed: config.baseSpeed,
        isFever: false,
        playerY: 0,
        velocityY: 0,
        jumps: 0,
        feverGauge: 0,
        lastTime: performance.now(),
        itemTimer: 0,
        obsTimer: 0,
        stompTimer: 0,
        flyTimer: 0,
        holeTimer: 0,
        isAboveHole: false,
        firstHoleSpawned: false
    };

    el.player.classList.remove('player-spin-anim');
    currentPlayerImageKey = null; 
    setPlayerImage('player'); 

    el.overlay.style.display = 'none';
    el.container.classList.remove('fever-mode');
    document.querySelectorAll('.item, .obstacle, .stompEnemy, .flyEnemy, .hole').forEach(n => n.remove());
    
    requestAnimationFrame(gameLoop);
}

function handleInput() {
    if (!state.running || state.isMissed || !isLandscape || state.jumps >= 2) return;
    
    if (state.jumps === 1) {
        if (spinTimeoutId) clearTimeout(spinTimeoutId);
        el.player.classList.remove('player-spin-anim');
        void el.player.offsetWidth; 
        el.player.classList.add('player-spin-anim');
        spinTimeoutId = setTimeout(() => {
            el.player.classList.remove('player-spin-anim');
        }, 360);
    }

    state.velocityY = config.jumpPower;
    state.jumps++;
    setPlayerImage('playerJump');
}

/**
 * プレイヤー表示制御の唯一の窓口
 * early return 条件を緩和し、より確実に画像を反映する (Amber指示 ①)
 */
function setPlayerImage(key) {
    console.log('setPlayerImage called:', key, 'current=', currentPlayerImageKey);

    // 簡略化されたチェック
    if (currentPlayerImageKey === key) return;

    // 初期化
    el.player.classList.remove('player-fallback');
    el.player.style.backgroundImage = '';

    // 1. 指定された画像が使える場合
    if (assetStatus[key]) {
        el.player.style.backgroundImage = `url(${assets[key]})`;
        currentPlayerImageKey = key;
    } 
    // 2. 指定画像がダメだが通常走行画像(player)なら使える場合 (フォールバック)
    else if (key !== 'player' && assetStatus['player']) {
        el.player.style.backgroundImage = `url(${assets['player']})`;
        currentPlayerImageKey = 'player';
    } 
    // 3. どちらもダメな場合
    else {
        console.warn('player fallback used:', key); 
        el.player.classList.add('player-fallback');
        currentPlayerImageKey = null;
    }
}

function gameLoop(timestamp) {
    if (!state.running) return;
    if (!isLandscape) {
        state.lastTime = timestamp;
        requestAnimationFrame(gameLoop);
        return;
    }

    const deltaTime = Math.min(32, timestamp - state.lastTime); 
    state.lastTime = timestamp;
    const deltaScale = deltaTime / 16.66;

    update(deltaTime, deltaScale, timestamp);
    draw(timestamp);
    requestAnimationFrame(gameLoop);
}

function update(dt, ds, timestamp) {
    if (state.isMissed) {
        state.velocityY += config.gravity * ds;
        state.playerY -= state.velocityY * ds;
        return;
    }

    if (!state.isFever) {
        state.speed = Math.min(config.maxSpeed, config.baseSpeed + (state.distance / 5000));
    }
    const currentTotalSpeed = state.speed + (state.isFever ? config.feverBonus : 0);

    state.velocityY += config.gravity * ds;
    state.playerY -= state.velocityY * ds;

    // 着地判定
    if (state.playerY <= 0) {
        if (!state.isAboveHole) {
            state.playerY = 0;
            state.velocityY = 0;
            state.jumps = 0;
            if (!state.isMissed && currentPlayerImageKey !== 'player') {
                setPlayerImage('player');
            }
        } else {
            if (state.playerY < -200) {
                triggerMiss();
                return;
            }
        }
    }

    const moveDist = currentTotalSpeed * ds;
    state.distance += moveDist;
    state.scoreRaw += moveDist * config.scoreRate;

    const bgPos = (state.distance % window.innerWidth);
    el.layerMid.style.transform = `translateX(${-bgPos * 0.4}px)`;
    el.layerBack.style.transform = `translateX(${-bgPos * 0.15}px)`;
    el.ground.style.transform = `translateX(${-bgPos}px)`;

    state.itemTimer += dt;
    while (state.itemTimer >= config.itemInterval) {
        createEntity('item');
        state.itemTimer -= config.itemInterval;
    }

    if (!state.isFever) {
        state.obsTimer += dt;
        state.stompTimer += dt;
        state.flyTimer += dt;
        state.holeTimer += dt;

        if (config.DEBUG_FORCE_HOLE && !state.firstHoleSpawned && state.distance > 1500) {
            createEntity('hole');
            state.firstHoleSpawned = true;
        }

        while (state.obsTimer >= config.obsInterval) {
            createEntity('obstacle');
            state.obsTimer -= config.obsInterval;
        }
        while (state.stompTimer >= config.stompInterval) {
            createEntity('stompEnemy');
            state.stompTimer -= config.stompInterval;
        }
        while (state.flyTimer >= config.flyInterval) {
            createEntity('flyEnemy');
            state.flyTimer -= config.flyInterval;
        }
        while (state.holeTimer >= config.holeInterval) {
            createEntity('hole');
            state.holeTimer -= config.holeInterval;
        }
    }

    updateEntities(ds, currentTotalSpeed, timestamp);
}

/**
 * 敵の画像フォールバックを考慮した生成
 */
function createEntity(type) {
    const obj = document.createElement('div');
    obj.className = type;
    obj.dataset.x = 110;
    
    if (type === 'item') {
        obj.style.bottom = (25 + Math.random() * 35) + '%';
        // アイテム画像失敗時のフォールバック (Amber指示 ②)
        if (assetStatus.ruby) {
            obj.style.backgroundImage = `url(${assets.ruby})`;
            obj.style.boxShadow = 'none'; // 画像がある時は発光を抑える
            obj.style.backgroundColor = 'transparent';
        } else {
            // CSS側のデフォルトスタイルが適用される
        }
    } else if (type === 'obstacle') {
        obj.classList.add('enemy-auto');
        if (assetStatus.enemyAuto) {
            obj.style.backgroundImage = `url(${assets.enemyAuto})`;
        } else {
            obj.classList.add('fallback-enemy');
        }
        obj.style.bottom = config.groundHeight + '%';
        obj.dataset.yOffset = 0;
        obj.dataset.yVel = 0;
        obj.dataset.jumpTimer = Math.random() * 2000;
    } else if (type === 'stompEnemy') {
        obj.classList.add('enemy-satoru');
        if (assetStatus.enemySatoru) {
            obj.style.backgroundImage = `url(${assets.enemySatoru})`;
        } else {
            obj.classList.add('fallback-enemy');
        }
        obj.style.bottom = config.groundHeight + '%';
    } else if (type === 'flyEnemy') {
        obj.classList.add('enemy-arakatsu');
        if (assetStatus.enemyArakatsu) {
            obj.style.backgroundImage = `url(${assets.enemyArakatsu})`;
        } else {
            obj.classList.add('fallback-enemy');
        }
        obj.style.bottom = (35 + Math.random() * 25) + '%';
    } else if (type === 'hole') {
        obj.style.bottom = '0';
    } else {
        obj.style.bottom = config.groundHeight + '%';
    }
    el.container.appendChild(obj);
}

function updateEntities(ds, speed, timestamp) {
    const pRect = el.player.getBoundingClientRect();
    const entities = document.querySelectorAll('.item, .obstacle, .stompEnemy, .flyEnemy, .hole');
    
    // 敵の拡大に伴い hitMargin を調整 (Amber指示 ④)
    const baseHitMargin = 14; 

    state.isAboveHole = false;

    for (const ent of entities) {
        let x = parseFloat(ent.dataset.x);
        x -= (speed / 12) * ds;
        ent.dataset.x = x;

        // 敵タイプごとの当たり判定調整 (Amber指示 ④)
        let hitMargin = baseHitMargin;
        if (ent.classList.contains('enemy-auto')) hitMargin = 28; // さらに内側に
        if (ent.classList.contains('enemy-satoru')) hitMargin = 28;
        if (ent.classList.contains('enemy-arakatsu')) hitMargin = 35; // 飛行敵はさらに甘く

        // 固有挙動
        let wobbleX = 0;
        if (ent.classList.contains('enemy-satoru')) {
            wobbleX = Math.sin(timestamp / 150) * 10;
        }

        let autoY = 0;
        if (ent.classList.contains('enemy-auto') && !state.isMissed) {
            let yVel = parseFloat(ent.dataset.yVel || 0);
            let yOffset = parseFloat(ent.dataset.yOffset || 0);
            let jTimer = parseFloat(ent.dataset.jumpTimer || 0);
            jTimer -= 16.6 * ds;
            if (jTimer <= 0 && yOffset === 0) {
                yVel = -12; 
                jTimer = 2000 + Math.random() * 3000;
            }
            if (yOffset > 0 || yVel !== 0) {
                yVel += 0.6 * ds;
                yOffset -= yVel * ds;
                if (yOffset <= 0) { yOffset = 0; yVel = 0; }
            }
            ent.dataset.yVel = yVel;
            ent.dataset.yOffset = yOffset;
            ent.dataset.jumpTimer = jTimer;
            autoY = yOffset;
        }

        let bobY = 0;
        if (ent.classList.contains('enemy-arakatsu')) {
            bobY = Math.sin(timestamp / 200) * 15;
        }

        ent.style.left = `calc(${x}% + ${wobbleX}px)`;
        ent.style.transform = `translateY(${-autoY + bobY}px)`;

        const eRect = ent.getBoundingClientRect();

        if (ent.classList.contains('hole')) {
            const playerCenterX = pRect.left + pRect.width / 2;
            if (playerCenterX > eRect.left && playerCenterX < eRect.right) {
                state.isAboveHole = true;
            }
        }

        if (!ent.classList.contains('hole') && 
            pRect.left + hitMargin < eRect.right &&
            pRect.right - hitMargin > eRect.left &&
            pRect.top + hitMargin < eRect.bottom &&
            pRect.bottom - hitMargin > eRect.top) {
            
            if (ent.classList.contains('item')) {
                ent.remove();
                state.scoreRaw += 500;
                if (!state.isFever) {
                    state.feverGauge = Math.min(100, state.feverGauge + 10);
                    if (state.feverGauge >= 100) startFever();
                }
            } 
            else {
                const isStompable = ent.classList.contains('stompEnemy') || 
                                    ent.classList.contains('flyEnemy') || 
                                    ent.classList.contains('obstacle');

                if (isStompable) {
                    const isFalling = state.velocityY > 0;
                    const playerBottom = pRect.bottom - hitMargin;
                    const enemyTopLimit = ent.classList.contains('flyEnemy') ? eRect.top + 35 : eRect.top + 20;

                    if (isFalling && playerBottom < enemyTopLimit + 20) {
                        ent.remove();
                        state.scoreRaw += 500;
                        state.velocityY = config.stompBouncePower;
                        state.jumps = 1;
                        if (!state.isFever) state.feverGauge = Math.min(100, state.feverGauge + 5);
                    } else if (!state.isFever) {
                        triggerMiss();
                        return;
                    }
                }
            }
        }
        if (x < -25) ent.remove();
    }
}

function triggerMiss() {
    if (state.isMissed) return;
    if (gameBgm) gameBgm.volume = config.bgmVolume * 0.2;
    if (missTimeoutId) {
        clearTimeout(missTimeoutId);
        missTimeoutId = null;
    }
    state.isMissed = true;
    setPlayerImage('playerMiss');
    el.player.classList.remove('player-spin-anim');
    state.velocityY = -12; 
    missTimeoutId = setTimeout(() => {
        showGameOver();
    }, 800);
}

function startFever() {
    if (feverTimeoutId) clearTimeout(feverTimeoutId);
    state.isFever = true;
    el.container.classList.add('fever-mode');
    feverTimeoutId = setTimeout(() => {
        if (!state.running) return;
        state.isFever = false;
        state.feverGauge = 0;
        el.container.classList.remove('fever-mode');
        feverTimeoutId = null;
    }, config.feverDuration);
}

function draw(timestamp) {
    const visualY = (config.groundHeight + (state.playerY / window.innerHeight * 100));
    el.player.style.bottom = visualY + '%';
    el.score.textContent = Math.floor(state.scoreRaw);
    el.feverBar.style.width = state.feverGauge + '%';
}

function showGameOver() {
    state.running = false;
    // BGM完全リセット処理 (Amber指示 ③)
    if (gameBgm) {
        gameBgm.pause();
        gameBgm.currentTime = 0;
        gameBgm.volume = config.bgmVolume;
    }

    if (feverTimeoutId) clearTimeout(feverTimeoutId);
    if (spinTimeoutId) clearTimeout(spinTimeoutId);
    if (missTimeoutId) {
        clearTimeout(missTimeoutId);
        missTimeoutId = null;
    }
    
    document.getElementById('msg-title').textContent = "GAME OVER";
    document.getElementById('msg-body').textContent = `SCORE: ${Math.floor(state.scoreRaw)}`;
    el.overlay.style.display = 'flex';
}

init();
</script>
</body>
</html>
