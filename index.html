<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DENRUNNER - Phase 2 (Action & Pits)</title>
    <style>
        :root {
            --bg-sky: linear-gradient(to bottom, #1e90ff, #87ceeb);
            --fever-bg: linear-gradient(45deg, #ff00ff, #ff8c00, #4b0082);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { 
            width: 100%; height: 100%; overflow: hidden; 
            background: #000; font-family: 'Arial', sans-serif;
            touch-action: none; -webkit-user-select: none; user-select: none;
        }

        /* 向き判定用 */
        #rotate-notice {
            position: fixed; inset: 0; background: #111; color: #fff;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            z-index: 10000; text-align: center; padding: 20px;
        }
        #game-container { display: block; position: relative; width: 100vw; height: 100vh; background: var(--bg-sky); overflow: hidden; }

        @media (orientation: portrait) { 
            #rotate-notice { display: flex; } 
            #game-container { display: none; } 
        }

        #game-container.fever-mode { background: var(--fever-bg); animation: fever-flash 0.5s infinite alternate; }
        @keyframes fever-flash { from { filter: hue-rotate(0deg); } to { filter: hue-rotate(90deg); } }

        .layer { position: absolute; top: 0; left: 0; width: 200%; height: 100%; pointer-events: none; }
        #layer-back { background: radial-gradient(circle at 20% 20%, #fff 0%, transparent 10%); opacity: 0.3; }
        #layer-mid { background: repeating-linear-gradient(90deg, transparent 0, transparent 200px, rgba(255,255,255,0.1) 200px, rgba(255,255,255,0.1) 400px); }
        #ground { position: absolute; bottom: 0; width: 200%; height: 15%; background: #5d4037; border-top: 4px solid #8d6e63; z-index: 10; }

        #input-layer { position: absolute; inset: 0; z-index: 1500; }

        #player {
            position: absolute; left: 10%; bottom: 15%; width: 80px; height: 80px; z-index: 100;
            background-color: transparent; background-size: contain; background-repeat: no-repeat; background-position: center;
            /* 回転演出用 (Amber指示 ①) */
            transition: transform 0.3s ease-out;
            transform-origin: center center;
        }
        .player-spin { transform: rotate(360deg); }
        .player-fallback { background-color: #ffeb3b !important; border-radius: 10px; }

        /* エンティティ */
        .item, .obstacle, .stompEnemy, .flyEnemy, .hole { position: absolute; background-size: contain; background-repeat: no-repeat; background-position: center; }

        .item { width: 45px; height: 45px; z-index: 50; border-radius: 50%; background-color: #ff4081; box-shadow: 0 0 15px #fff; }
        .obstacle { width: 55px; height: 65px; z-index: 40; background: #333; border-radius: 5px; border: 2px solid #555; }
        .stompEnemy { width: 60px; height: 50px; z-index: 45; background-color: #4caf50; border: 3px solid #fff; border-radius: 8px; }
        
        /* 飛行敵 (Amber指示 ③) */
        .flyEnemy { width: 50px; height: 40px; z-index: 48; background-color: #f44336; border-radius: 50% 50% 10% 10%; border: 2px solid #fff; }
        
        /* 落とし穴 (Amber指示 ②) */
        .hole { 
            width: 120px; height: 16%; bottom: 0; z-index: 5; 
            background: var(--bg-sky); /* 地面を隠すために背景色と同じにする */
            box-shadow: inset 10px 0 10px rgba(0,0,0,0.2), inset -10px 0 10px rgba(0,0,0,0.2);
        }

        #ui-layer { position: absolute; top: 20px; left: 20px; z-index: 2000; color: #fff; text-shadow: 2px 2px 4px #000; pointer-events: none; }
        .stat-box { font-size: 22px; font-weight: bold; margin-bottom: 5px; }
        #fever-bar-container { width: 200px; height: 15px; background: rgba(0,0,0,0.5); border: 2px solid #fff; border-radius: 10px; }
        #fever-bar { width: 0%; height: 100%; background: linear-gradient(90deg, #ff0, #f0f); transition: width 0.1s linear; }

        #overlay {
            position: absolute; inset: 0; background: rgba(0,0,0,0.7);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 3000; color: #fff; text-align: center; padding: 20px;
        }
        button {
            padding: 15px 45px; font-size: 24px; cursor: pointer; border: none;
            border-radius: 50px; background: #ffeb3b; color: #333; font-weight: bold;
            margin-top: 20px; pointer-events: auto; box-shadow: 0 4px 0 #c4a000;
        }
        button:active { transform: translateY(2px); box-shadow: 0 2px 0 #c4a000; }
    </style>
</head>
<body>

    <div id="rotate-notice">
        <h1>スマホを横向きにしてください</h1>
        <p style="margin-top:10px;">DENRUNNERは横画面専用です</p>
    </div>

    <div id="game-container">
        <div id="layer-back" class="layer"></div>
        <div id="layer-mid" class="layer"></div>
        <div id="ground"></div>
        <div id="input-layer"></div>

        <div id="player"></div>

        <div id="ui-layer">
            <div class="stat-box">SCORE: <span id="score-val">0</span></div>
            <div id="fever-bar-container"><div id="fever-bar"></div></div>
        </div>

        <div id="overlay">
            <h1 id="msg-title">DENRUNNER</h1>
            <p id="msg-body">タップでジャンプ！ 2段ジャンプで回転！<br>落とし穴に気をつけて！</p>
            <button id="start-btn">GAME START</button>
        </div>
    </div>

<script>
/**
 * Denrunner: Expansion Phase 2
 * 監修: アンバー / 実装: ヘルメス
 * * 修正・追加内容:
 * 1. 2段ジャンプ時の360度回転演出 (Amber指示 ①)
 * 2. 落とし穴ギミック (Amber指示 ②)
 * 3. 飛行敵のエネミータイプ追加 (Amber指示 ③)
 * 4. startBtn.disabled の廃止 (Amber指示 ④)
 * 5. アセットのpreload整理 (Amber指示 ⑤)
 */

const config = {
    gravity: 0.8,
    jumpPower: -16,
    stompBouncePower: -12,
    baseSpeed: 7,
    maxSpeed: 18,
    feverBonus: 8,
    feverDuration: 5000,
    itemInterval: 1200, 
    obsInterval: 2500,
    stompInterval: 3500,
    flyInterval: 4500,     // 飛行敵の間隔 (Amber指示 ③)
    holeInterval: 5500,    // 落とし穴の間隔 (Amber指示 ②)
    groundHeight: 15,
    scoreRate: 0.1
};

let feverTimeoutId = null;
let isLandscape = true;

let state = {
    running: false,
    distance: 0,
    scoreRaw: 0,
    speed: config.baseSpeed,
    isFever: false,
    playerY: 0,
    velocityY: 0,
    jumps: 0,
    feverGauge: 0,
    lastTime: 0,
    // タイマー管理
    itemTimer: 0,
    obsTimer: 0,
    stompTimer: 0,
    flyTimer: 0,
    holeTimer: 0,
    isAboveHole: false // 現在落とし穴の上にいるかどうかのフラグ
};

const assets = {
    player: 'DENさん走行時.gif',
    playerJump: 'DENさんジャンプ.png',
    ruby: 'イザックるびぃ.png'
};

const el = {
    container: document.getElementById('game-container'),
    input: document.getElementById('input-layer'),
    player: document.getElementById('player'),
    ground: document.getElementById('ground'),
    score: document.getElementById('score-val'),
    feverBar: document.getElementById('fever-bar'),
    overlay: document.getElementById('overlay'),
    startBtn: document.getElementById('start-btn'),
    layerMid: document.getElementById('layer-mid'),
    layerBack: document.getElementById('layer-back'),
    notice: document.getElementById('rotate-notice')
};

function checkOrientation() {
    isLandscape = window.innerWidth > window.innerHeight;
    if (isLandscape) {
        el.notice.style.display = 'none';
        el.container.style.display = 'block';
    } else {
        el.notice.style.display = 'flex';
        el.container.style.display = 'none';
    }
}

function init() {
    window.addEventListener('resize', checkOrientation);
    window.addEventListener('orientationchange', checkOrientation);
    checkOrientation();

    el.startBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        startGame();
    });
    el.input.addEventListener('pointerdown', handleInput);
    
    // 全アセットのプリロード整理 (Amber指示 ⑤)
    preloadAssets();
}

function preloadAssets() {
    Object.values(assets).forEach(src => {
        const img = new Image();
        img.src = src;
        if (src === assets.player) {
            img.onload = () => {
                el.player.classList.remove('player-fallback');
                setPlayerImage(assets.player);
            };
            img.onerror = () => el.player.classList.add('player-fallback');
        }
    });
}

function startGame() {
    if (state.running) return;
    // startBtn.disabled は削除 (Amber指示 ④)

    if (feverTimeoutId) {
        clearTimeout(feverTimeoutId);
        feverTimeoutId = null;
    }

    state = {
        running: true,
        distance: 0,
        scoreRaw: 0,
        speed: config.baseSpeed,
        isFever: false,
        playerY: 0,
        velocityY: 0,
        jumps: 0,
        feverGauge: 0,
        lastTime: performance.now(),
        itemTimer: 0,
        obsTimer: 0,
        stompTimer: 0,
        flyTimer: 0,
        holeTimer: 0,
        isAboveHole: false
    };

    el.player.classList.remove('player-spin');
    el.overlay.style.display = 'none';
    el.container.classList.remove('fever-mode');
    document.querySelectorAll('.item, .obstacle, .stompEnemy, .flyEnemy, .hole').forEach(n => n.remove());
    
    requestAnimationFrame(gameLoop);
}

function handleInput() {
    if (!state.running || !isLandscape || state.jumps >= 2) return;
    
    // 2段ジャンプ時の演出 (Amber指示 ①)
    if (state.jumps === 1) {
        el.player.classList.remove('player-spin');
        void el.player.offsetWidth; // 強制リフロー
        el.player.classList.add('player-spin');
        // 回転が終わったらクラスを外す (演出の再利用のため)
        setTimeout(() => el.player.classList.remove('player-spin'), 350);
    }

    state.velocityY = config.jumpPower;
    state.jumps++;
    setPlayerImage(assets.playerJump);
}

function setPlayerImage(src) {
    if (src) el.player.style.backgroundImage = `url(${src})`;
}

function gameLoop(timestamp) {
    if (!state.running) return;
    if (!isLandscape) {
        state.lastTime = timestamp;
        requestAnimationFrame(gameLoop);
        return;
    }

    const deltaTime = Math.min(32, timestamp - state.lastTime); 
    state.lastTime = timestamp;
    const deltaScale = deltaTime / 16.66;

    update(deltaTime, deltaScale);
    draw();
    requestAnimationFrame(gameLoop);
}

function update(dt, ds) {
    if (!state.isFever) {
        state.speed = Math.min(config.maxSpeed, config.baseSpeed + (state.distance / 5000));
    }
    const currentTotalSpeed = state.speed + (state.isFever ? config.feverBonus : 0);

    // プレイヤー物理
    state.velocityY += config.gravity * ds;
    state.playerY -= state.velocityY * ds;

    // 着地判定 (Amber指示 ②: 落とし穴の考慮)
    if (state.playerY <= 0) {
        if (!state.isAboveHole) {
            // 地面がある場合は着地
            state.playerY = 0;
            state.velocityY = 0;
            state.jumps = 0;
            setPlayerImage(assets.player);
        } else {
            // 穴の上ならそのまま落下を継続。一定以上落ちたら死ぬ
            if (state.playerY < -150) {
                gameOver();
                return;
            }
        }
    }

    // スコア & 距離
    const moveDist = currentTotalSpeed * ds;
    state.distance += moveDist;
    state.scoreRaw += moveDist * config.scoreRate;

    // 背景スクロール
    const bgPos = (state.distance % window.innerWidth);
    el.layerMid.style.transform = `translateX(${-bgPos * 0.4}px)`;
    el.layerBack.style.transform = `translateX(${-bgPos * 0.15}px)`;
    el.ground.style.transform = `translateX(${-bgPos}px)`;

    // 生成タイマー (while方式)
    state.itemTimer += dt;
    state.obsTimer += dt;
    state.stompTimer += dt;
    state.flyTimer += dt;
    state.holeTimer += dt;

    while (state.itemTimer >= config.itemInterval) {
        createEntity('item');
        state.itemTimer -= config.itemInterval;
    }
    while (state.obsTimer >= config.obsInterval) {
        if (!state.isFever) createEntity('obstacle');
        state.obsTimer -= config.obsInterval;
    }
    while (state.stompTimer >= config.stompInterval) {
        createEntity('stompEnemy');
        state.stompTimer -= config.stompInterval;
    }
    while (state.flyTimer >= config.flyInterval) {
        createEntity('flyEnemy');
        state.flyTimer -= config.flyInterval;
    }
    while (state.holeTimer >= config.holeInterval) {
        createEntity('hole');
        state.holeTimer -= config.holeInterval;
    }

    updateEntities(ds, currentTotalSpeed);
}

function createEntity(type) {
    const obj = document.createElement('div');
    obj.className = type;
    obj.dataset.x = 110;
    
    if (type === 'item') {
        obj.style.bottom = (25 + Math.random() * 35) + '%';
        obj.style.backgroundImage = `url(${assets.ruby})`;
    } else if (type === 'flyEnemy') {
        // 飛行敵の高さ設定 (Amber指示 ③)
        obj.style.bottom = (35 + Math.random() * 25) + '%';
    } else if (type === 'hole') {
        // 落とし穴は地面と同じ高さ
        obj.style.bottom = '0';
    } else {
        obj.style.bottom = config.groundHeight + '%';
    }
    el.container.appendChild(obj);
}

function updateEntities(ds, speed) {
    const pRect = el.player.getBoundingClientRect();
    const entities = document.querySelectorAll('.item, .obstacle, .stompEnemy, .flyEnemy, .hole');
    const hitMargin = 14; 

    // 落とし穴フラグを一旦リセット
    state.isAboveHole = false;

    for (const ent of entities) {
        let x = parseFloat(ent.dataset.x);
        x -= (speed / 12) * ds;
        ent.dataset.x = x;
        ent.style.left = x + '%';

        const eRect = ent.getBoundingClientRect();

        // 1. 落とし穴判定 (Amber指示 ②)
        // プレイヤーの足元の中心が穴の範囲内にあるかチェック
        if (ent.classList.contains('hole')) {
            const playerCenterX = pRect.left + pRect.width / 2;
            if (playerCenterX > eRect.left && playerCenterX < eRect.right) {
                state.isAboveHole = true;
            }
        }

        // 2. 衝突判定 (穴以外の通常オブジェクト)
        if (!ent.classList.contains('hole') && 
            pRect.left + hitMargin < eRect.right &&
            pRect.right - hitMargin > eRect.left &&
            pRect.top + hitMargin < eRect.bottom &&
            pRect.bottom - hitMargin > eRect.top) {
            
            if (ent.classList.contains('item')) {
                ent.remove();
                state.scoreRaw += 500;
                if (!state.isFever) {
                    state.feverGauge = Math.min(100, state.feverGauge + 10);
                    if (state.feverGauge >= 100) startFever();
                }
            } 
            else if (ent.classList.contains('stompEnemy')) {
                const isFalling = state.velocityY > 0;
                const playerBottom = pRect.bottom - hitMargin;
                const enemyTop = eRect.top + 10;

                if (isFalling && playerBottom < enemyTop + 20) {
                    ent.remove();
                    state.scoreRaw += 500;
                    state.velocityY = config.stompBouncePower;
                    state.jumps = 1;
                    if (!state.isFever) state.feverGauge = Math.min(100, state.feverGauge + 5);
                } else if (!state.isFever) {
                    gameOver();
                    return;
                }
            }
            else if ((ent.classList.contains('obstacle') || ent.classList.contains('flyEnemy')) && !state.isFever) {
                // 通常障害物または飛行敵への接触 (Amber指示 ③)
                gameOver();
                return;
            }
        }
        if (x < -20) ent.remove();
    }
}

function startFever() {
    if (feverTimeoutId) clearTimeout(feverTimeoutId);
    state.isFever = true;
    el.container.classList.add('fever-mode');
    
    feverTimeoutId = setTimeout(() => {
        if (!state.running) return;
        state.isFever = false;
        state.feverGauge = 0;
        el.container.classList.remove('fever-mode');
        feverTimeoutId = null;
    }, config.feverDuration);
}

function draw() {
    // Y座標の反映 (落とし穴による落下も考慮)
    el.player.style.bottom = (config.groundHeight + (state.playerY / window.innerHeight * 100)) + '%';
    el.score.textContent = Math.floor(state.scoreRaw);
    el.feverBar.style.width = state.feverGauge + '%';
}

function gameOver() {
    state.running = false;
    if (feverTimeoutId) {
        clearTimeout(feverTimeoutId);
        feverTimeoutId = null;
    }
    document.getElementById('msg-title').textContent = "GAME OVER";
    document.getElementById('msg-body').textContent = `FINAL SCORE: ${Math.floor(state.scoreRaw)}`;
    el.overlay.style.display = 'flex';
}

init();
</script>
</body>
</html>
