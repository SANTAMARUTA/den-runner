<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DENRUNNER - Final Masterpiece (Absolute Fix)</title>
    <style>
        :root {
            --bg-sky: linear-gradient(to bottom, #1e90ff, #87ceeb);
            --fever-bg: linear-gradient(45deg, #ff00ff, #ff8c00, #4b0082);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { 
            width: 100%; height: 100%; overflow: hidden; 
            background: #000; font-family: 'Arial', sans-serif;
            touch-action: none; -webkit-user-select: none; user-select: none;
        }

        #rotate-notice {
            position: fixed; inset: 0; background: #111; color: #fff;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            z-index: 10000; text-align: center; padding: 20px;
        }
        #game-container { position: relative; width: 100vw; height: 100vh; background: var(--bg-sky); overflow: hidden; display: none; }

        @media (orientation: portrait) { 
            #rotate-notice { display: flex; } 
            #game-container { display: none !important; } 
        }

        #game-container.fever-mode { background: var(--fever-bg); animation: fever-flash 0.5s infinite alternate; }
        @keyframes fever-flash { from { filter: hue-rotate(0deg); } to { filter: hue-rotate(90deg); } }

        .layer { position: absolute; top: 0; left: 0; width: 200%; height: 100%; pointer-events: none; }
        #layer-back { background: radial-gradient(circle at 20% 20%, #fff 0%, transparent 10%); opacity: 0.3; }
        #layer-mid { background: repeating-linear-gradient(90deg, transparent 0, transparent 200px, rgba(255,255,255,0.1) 200px, rgba(255,255,255,0.1) 400px); }
        #ground { position: absolute; bottom: 0; width: 200%; height: 15%; background: #5d4037; border-top: 4px solid #8d6e63; z-index: 10; }

        #input-layer { position: absolute; inset: 0; z-index: 1500; }

        #player {
            position: absolute; left: 10%; bottom: 15%; width: 80px; height: 80px; z-index: 100;
            transform-origin: center center;
            will-change: transform;
            backface-visibility: hidden;
            transform: translateZ(0);
        }
        #player img {
            position: absolute; width: 100%; height: 100%; object-fit: contain; pointer-events: none;
            transition: opacity 0.15s linear;
        }
        #player-img-main { opacity: 1; z-index: 2; }
        #player-img-sub { opacity: 0; z-index: 1; }

        .player-spin-anim { animation: spin-once 0.35s linear forwards; }
        @keyframes spin-once { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .item, .obstacle, .stompEnemy, .flyEnemy, .hole { 
            position: absolute; background-size: contain; background-repeat: no-repeat; background-position: center; 
        }

        .item { width: 45px; height: 45px; z-index: 50; border-radius: 50%; background-color: #ff4081; box-shadow: 0 0 15px #fff; }
        .enemy-auto { width: 110px; height: 110px; z-index: 40; }
        .enemy-satoru { width: 115px; height: 100px; z-index: 45; }
        .enemy-arakatsu { width: 105px; height: 85px; z-index: 48; }
        .fallback-enemy { border-radius: 8px; }
        .hole { width: 140px; height: 16%; bottom: 0; z-index: 5; background: linear-gradient(to bottom, #1a1a1a, #000); border-left: 4px solid #3e2723; border-right: 4px solid #3e2723; box-shadow: inset 0 10px 20px rgba(0,0,0,0.8); }

        .stomp-effect { position: absolute; font-size: 32px; pointer-events: none; z-index: 200; animation: stompPop 0.4s ease-out forwards; color: #fff; text-shadow: 0 0 8px #ff0; transform: translate(-50%, -50%); }
        @keyframes stompPop { 0% { transform: translate(-50%, -50%) scale(0.5); opacity: 1; } 100% { transform: translate(-50%, -100%) scale(2.0); opacity: 0; } }

        #ui-layer { position: absolute; top: 20px; left: 20px; z-index: 2000; color: #fff; text-shadow: 2px 2px 4px #000; pointer-events: none; }
        #fever-bar-container { width: 200px; height: 15px; background: rgba(0,0,0,0.5); border: 2px solid #fff; border-radius: 10px; margin-top: 5px; }
        #fever-bar { width: 0%; height: 100%; background: linear-gradient(90deg, #ff0, #f0f); transition: width 0.1s linear; }

        #overlay {
            position: absolute; inset: 0; background: rgba(0,0,0,0.85);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 3000; color: #fff; text-align: center; padding: 20px; overflow-y: auto;
        }

        #loading-screen { display: flex; font-size: 24px; font-weight: bold; }
        #title-screen { display: none; }
        #result-screen { display: none; width: 100%; max-width: 500px; padding: 20px; background: rgba(255,255,255,0.1); border-radius: 20px; border: 2px solid rgba(255,255,255,0.2); }

        #title-image { max-width: 90vw; max-height: 65vh; width: auto; height: auto; border-radius: 12px; margin-bottom: 20px; object-fit: contain; }

        .btn {
            font-size: 24px; padding: 12px 50px; border-radius: 50px;
            background: linear-gradient(45deg, #ff9800, #ff5722); color: white;
            border: none; cursor: pointer; font-weight: bold; box-shadow: 0 6px 0 #bf360c;
            position: relative; z-index: 10;
        }
        .btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #bf360c; }
    </style>
</head>
<body>

    <div id="rotate-notice">
        <h1>スマホを横向きにしてね！</h1>
        <p style="margin-top:10px;">DENRUNNERは横画面専用です</p>
    </div>

    <div id="game-container">
        <div id="layer-back" class="layer"></div>
        <div id="layer-mid" class="layer"></div>
        <div id="ground"></div>
        <div id="input-layer"></div>

        <div id="player">
            <img id="player-img-main" src="" alt="">
            <img id="player-img-sub" src="" alt="">
        </div>

        <div id="ui-layer">
            <div style="font-size: 22px; font-weight: bold;">SCORE: <span id="score-val">0</span></div>
            <div id="fever-bar-container"><div id="fever-bar"></div></div>
        </div>

        <div id="overlay">
            <div id="loading-screen">
                <div>LOADING... <span id="load-percent">0</span>%</div>
            </div>
            <div id="title-screen">
                <img id="title-image" src="DENrunnertop.png" alt="DENRUNNER">
                <button id="start-btn" class="btn">GAME START</button>
            </div>
            <div id="result-screen">
                <h2 style="color: #ffeb3b; margin-bottom: 15px;">GAME RESULT</h2>
                <p id="res-tech"></p>
                <p id="res-attack"></p>
                <p id="res-jump"></p>
                <p id="res-ruby"></p>
                <h1 id="res-total" style="font-size: 42px; color: #ffeb3b; margin: 20px 0;"></h1>
                <button id="retry-btn" class="btn" style="background: #fff; color: #333; box-shadow: 0 4px 0 #999;">もう一度</button>
            </div>
        </div>
    </div>

<script>
/**
 * Denrunner: Masterpiece Edition (v9.3) - Absolute Completion
 * 監修: アンバー / 実装: ヘルメス
 * [最終仕上げ] タイムアウトID管理による二重カウントの物理的根絶
 */

const GameState = { LOADING: "loading", READY: "ready", PLAYING: "playing", GAMEOVER: "gameover" };

const config = {
    gravity: 0.8, jumpPower: -16, stompBouncePower: -12,
    baseSpeed: 7, maxSpeed: 18, feverBonus: 8, feverDuration: 5000,
    itemInterval: 1200, obsInterval: 2800, stompInterval: 3800, flyInterval: 4800, holeInterval: 6000,
    groundHeight: 15, scoreRate: 0.1, bgmVolume: 0.5, stompSeVolume: 0.7, itemSeVolume: 0.7, missSeVolume: 0.8, startSeVolume: 0.7
};

const assets = {
    player: 'DENさん走行時.gif', playerJump: 'DENさんジャンプ.png', playerMiss: 'DENさんクラッシュ.png',
    ruby: 'イザックるびぃ.png', enemyAuto: 'オート.png', enemySatoru: 'サトルさん.png', enemyArakatsu: 'アラカツさん.png',
    stompSe: '踏む音.mp3', itemSe: 'るびぃゲット.mp3', missSe: 'やられ音.mp3', startSe: 'スタート音.mp3',
    title: 'DENrunnertop.png'
};

let currentState = GameState.LOADING;
const loadedAssets = {}; 
const assetStatus = {}; 
const timeoutMap = {}; // 修正①：タイムアウトID管理用マップ
let audioUnlocked = false;
let animationId = null; 
let bgmFadeInterval = null;
let gameBgm = null;
let lastTime = 0;
let currentPlayerImageKey = null;
let currentImgTag = 'main';

let state = {
    running: false, isMissed: false, distance: 0, scoreRaw: 0, 
    speed: config.baseSpeed, isFever: false, playerY: 0, velocityY: 0, jumps: 0, feverGauge: 0, 
    itemTimer: 0, obsTimer: 0, stompTimer: 0, flyTimer: 0, holeTimer: 0, 
    isAboveHole: false, playTime: 0, stompCount: 0
};

const el = {
    container: document.getElementById('game-container'),
    overlay: document.getElementById('overlay'),
    loadingScreen: document.getElementById('loading-screen'),
    titleScreen: document.getElementById('title-screen'),
    resultScreen: document.getElementById('result-screen'),
    player: document.getElementById('player'),
    playerImgMain: document.getElementById('player-img-main'),
    playerImgSub: document.getElementById('player-img-sub'),
    score: document.getElementById('score-val'),
    feverBar: document.getElementById('fever-bar'),
    loadPercent: document.getElementById('load-percent'),
    ground: document.getElementById('ground'),
    layerMid: document.getElementById('layer-mid'),
    layerBack: document.getElementById('layer-back')
};

window.onload = initGame;

function initGame() {
    el.container.style.display = 'block';
    preloadAssets();
    window.addEventListener('resize', resizeGame);
    document.getElementById('start-btn').addEventListener('click', (e) => {
        e.stopPropagation();
        unlockAudio();
        startGame();
    });
    document.getElementById('retry-btn').addEventListener('click', () => { location.reload(); });
    document.getElementById('input-layer').addEventListener('pointerdown', handleInput);
    resizeGame();
}

/** * プリロード管理：競合完全排除パッチ (修正①②③)
 */
function preloadAssets() {
    const keys = Object.keys(assets);
    let loadedCount = 0;
    const total = keys.length;

    keys.forEach(key => { assetStatus[key] = false; });

    const onAssetComplete = (key, success = true) => {
        // 既に処理済みなら何もしない
        if (assetStatus[key]) return;
        assetStatus[key] = true;

        if (!success) {
            console.warn("[Failed/Timeout]", key);
        }

        // アセット実体格納
        if (!loadedAssets[key]) {
            loadedAssets[key] = success ? true : false;
        }

        loadedCount++;
        updateProgress(loadedCount, total);
    };

    keys.forEach(key => {
        const path = assets[key];
        const isAudio = path.endsWith('.mp3') || path.endsWith('.wav');

        // 修正②：タイムアウトを保存
        timeoutMap[key] = setTimeout(() => {
            onAssetComplete(key, false);
        }, 2000);

        if (isAudio) {
            const audio = new Audio();
            audio.src = path;
            audio.onloadeddata = () => {
                // 修正③：成功時にキャンセル
                clearTimeout(timeoutMap[key]);
                loadedAssets[key] = audio;
                onAssetComplete(key, true);
            };
            audio.onerror = () => {
                clearTimeout(timeoutMap[key]);
                onAssetComplete(key, false);
            };
        } else {
            const img = new Image();
            img.src = path;
            img.onload = () => {
                // 修正③：成功時にキャンセル
                clearTimeout(timeoutMap[key]);
                loadedAssets[key] = img;
                onAssetComplete(key, true);
            };
            img.onerror = () => {
                clearTimeout(timeoutMap[key]);
                onAssetComplete(key, false);
            };
        }
    });
}

function updateProgress(count, total) {
    const percent = Math.floor((count / total) * 100);
    el.loadPercent.textContent = percent;
    
    if (count >= total) {
        setTimeout(() => {
            if (currentState !== GameState.LOADING) return;
            currentState = GameState.READY;
            el.loadingScreen.style.display = 'none';
            el.titleScreen.style.display = 'flex';
        }, 300);
    }
}

function unlockAudio() {
    if (audioUnlocked) return;
    Object.keys(loadedAssets).forEach(key => {
        const asset = loadedAssets[key];
        if (asset instanceof Audio) {
            asset.play().then(() => { asset.pause(); asset.currentTime = 0; }).catch(() => {});
        }
    });
    audioUnlocked = true;
}

function resizeGame() {
    if (currentState === GameState.PLAYING || currentState === GameState.READY) {
        el.player.style.left = "10%";
    }
}

function playSe(src, volume) {
    if (!audioUnlocked) return;
    try { 
        const se = new Audio(src); 
        se.volume = volume; 
        se.play().catch(()=>{}); 
    } catch(e) {}
}

function resetGameState() {
    state = {
        running: true, isMissed: false, distance: 0, scoreRaw: 0, 
        speed: config.baseSpeed, isFever: false, playerY: 0, velocityY: 0, jumps: 0, feverGauge: 0, 
        itemTimer: 0, obsTimer: 0, stompTimer: 0, flyTimer: 0, holeTimer: 0, 
        isAboveHole: false, playTime: 0, stompCount: 0
    };
    el.player.style.display = 'block';
    el.player.style.bottom = config.groundHeight + '%';
    el.player.classList.remove('player-spin-anim');
    el.container.classList.remove('fever-mode');
    el.feverBar.style.width = '0%';
    el.score.textContent = '0';
    currentPlayerImageKey = null; currentImgTag = 'main';
    el.playerImgMain.style.opacity = 1; el.playerImgSub.style.opacity = 0;
    setPlayerImage('player');
    document.querySelectorAll('.item, .obstacle, .stompEnemy, .flyEnemy, .hole, .stomp-effect').forEach(n => n.remove());
}

function startGame() {
    if (currentState === GameState.PLAYING) return;
    if (animationId) cancelAnimationFrame(animationId);
    if (bgmFadeInterval) clearInterval(bgmFadeInterval);

    resetGameState();
    currentState = GameState.PLAYING;
    el.overlay.style.display = 'none';
    
    playSe(assets.startSe, config.startSeVolume);

    if (gameBgm) { gameBgm.pause(); gameBgm = null; }
    gameBgm = new Audio('DEN RUNNER Main Loop.mp3');
    gameBgm.loop = true;
    gameBgm.volume = 0;
    gameBgm.play().catch(() => {});

    let v = 0;
    bgmFadeInterval = setInterval(() => {
        v += 0.02;
        gameBgm.volume = Math.min(v, config.bgmVolume);
        if (v >= config.bgmVolume) clearInterval(bgmFadeInterval);
    }, 50);

    lastTime = performance.now();
    animationId = requestAnimationFrame(gameLoop);
}

function gameLoop(timestamp) {
    if (currentState !== GameState.PLAYING) {
        animationId = null;
        return; 
    }
    const deltaTime = Math.min(32, timestamp - lastTime); 
    lastTime = timestamp;
    update(deltaTime, timestamp);
    draw();
    animationId = requestAnimationFrame(gameLoop);
}

function update(dt, timestamp) {
    const ds = dt / 16.66;
    if (state.isMissed) {
        state.velocityY += config.gravity * ds;
        state.playerY -= state.velocityY * ds;
        return;
    }
    state.playTime += dt / 1000;
    if (!state.isFever) state.speed = Math.min(config.maxSpeed, config.baseSpeed + (state.distance / 5000));
    const totalSpeed = state.speed + (state.isFever ? config.feverBonus : 0);
    state.velocityY += config.gravity * ds;
    state.playerY -= state.velocityY * ds;
    if (state.playerY <= 0) {
        if (!state.isAboveHole) {
            state.playerY = 0; state.velocityY = 0; state.jumps = 0;
            if (currentPlayerImageKey !== 'player') setPlayerImage('player');
        } else if (state.playerY < -200) { triggerMiss(); return; }
    }
    const moveDist = totalSpeed * ds;
    state.distance += moveDist; state.scoreRaw += moveDist * config.scoreRate;
    const bgPos = (state.distance % window.innerWidth);
    el.layerMid.style.transform = `translateX(${-bgPos * 0.4}px)`;
    el.layerBack.style.transform = `translateX(${-bgPos * 0.15}px)`;
    el.ground.style.transform = `translateX(${-bgPos}px)`;
    state.itemTimer += dt;
    while (state.itemTimer >= config.itemInterval) { createEntity('item'); state.itemTimer -= config.itemInterval; }
    if (!state.isFever) {
        state.obsTimer += dt; state.stompTimer += dt; state.flyTimer += dt; state.holeTimer += dt;
        while (state.obsTimer >= config.obsInterval) { createEntity('obstacle'); state.obsTimer -= config.obsInterval; }
        while (state.stompTimer >= config.stompInterval) { createEntity('stompEnemy'); state.stompTimer -= config.stompInterval; }
        while (state.flyTimer >= config.flyInterval) { createEntity('flyEnemy'); state.flyTimer -= config.flyInterval; }
        while (state.holeTimer >= config.holeInterval) { createEntity('hole'); state.holeTimer -= config.holeInterval; }
    }
    updateEntities(ds, totalSpeed, timestamp);
}

function draw() {
    const visualY = (config.groundHeight + (state.playerY / window.innerHeight * 100));
    el.player.style.bottom = visualY + '%';
    el.score.textContent = Math.floor(state.scoreRaw);
    el.feverBar.style.width = state.feverGauge + '%';
}

function createEntity(type) {
    const obj = document.createElement('div');
    obj.className = type;
    obj.dataset.x = window.innerWidth + 150; 
    if (type === 'item') {
        obj.style.bottom = (25 + Math.random() * 35) + '%';
        if (loadedAssets.ruby && loadedAssets.ruby instanceof Image) { obj.style.backgroundImage = `url(${loadedAssets.ruby.src})`; obj.style.backgroundColor = 'transparent'; }
    } else if (type === 'obstacle') {
        obj.classList.add('enemy-auto');
        if (loadedAssets.enemyAuto && loadedAssets.enemyAuto instanceof Image) obj.style.backgroundImage = `url(${loadedAssets.enemyAuto.src})`; else obj.classList.add('fallback-enemy');
        obj.style.bottom = config.groundHeight + '%';
        obj.dataset.yVel = 0; obj.dataset.yOffset = 0; obj.dataset.jumpTimer = Math.random() * 2000;
    } else if (type === 'stompEnemy') {
        obj.classList.add('enemy-satoru'); obj.dataset.phase = Math.random() * Math.PI * 2;
        if (loadedAssets.enemySatoru && loadedAssets.enemySatoru instanceof Image) obj.style.backgroundImage = `url(${loadedAssets.enemySatoru.src})`; else obj.classList.add('fallback-enemy');
        obj.style.bottom = config.groundHeight + '%';
    } else if (type === 'flyEnemy') {
        obj.classList.add('enemy-arakatsu');
        if (loadedAssets.enemyArakatsu && loadedAssets.enemyArakatsu instanceof Image) obj.style.backgroundImage = `url(${loadedAssets.enemyArakatsu.src})`; else obj.classList.add('fallback-enemy');
        obj.style.bottom = (35 + Math.random() * 25) + '%';
    } else if (type === 'hole') { obj.style.bottom = '0'; }
    el.container.appendChild(obj);
}

function updateEntities(ds, speed, timestamp) {
    const pRect = el.player.getBoundingClientRect();
    const entities = document.querySelectorAll('.item, .obstacle, .stompEnemy, .flyEnemy, .hole');
    state.isAboveHole = false;
    for (const ent of entities) {
        let x = parseFloat(ent.dataset.x);
        x -= (speed * 0.8) * ds;
        ent.dataset.x = x;
        let hitMargin = 22; if (ent.classList.contains('enemy-arakatsu')) hitMargin = 35;
        let wobbleX = 0; if (ent.classList.contains('enemy-satoru')) { const phase = parseFloat(ent.dataset.phase || 0); wobbleX = Math.sin(timestamp / 150 + phase) * 10; }
        let autoY = 0;
        if (ent.classList.contains('enemy-auto')) {
            let yVel = parseFloat(ent.dataset.yVel), yOff = parseFloat(ent.dataset.yOffset), jTim = parseFloat(ent.dataset.jumpTimer);
            jTim -= 16.6 * ds;
            if (jTim <= 0 && yOff === 0) { yVel = -12; jTim = 2000 + Math.random() * 3000; }
            if (yOff > 0 || yVel !== 0) { yVel += 0.6 * ds; yOff -= yVel * ds; if (yOff <= 0) { yOff = 0; yVel = 0; } }
            ent.dataset.yVel = yVel; ent.dataset.yOffset = yOff; ent.dataset.jumpTimer = jTim; autoY = yOff;
        }
        let bobY = 0; if (ent.classList.contains('enemy-arakatsu')) bobY = Math.sin(timestamp / 200) * 15;
        ent.style.left = (x + wobbleX) + 'px';
        ent.style.transform = `translateY(${-autoY + bobY}px)`;
        const eRect = ent.getBoundingClientRect();
        if (ent.classList.contains('hole')) {
            const pCenter = pRect.left + pRect.width / 2;
            if (pCenter > eRect.left && pCenter < eRect.right) state.isAboveHole = true;
        }
        if (!ent.classList.contains('hole') && 
            pRect.left + hitMargin < eRect.right && pRect.right - hitMargin > eRect.left &&
            pRect.top + hitMargin < eRect.bottom && pRect.bottom - hitMargin > eRect.top) {
            if (ent.classList.contains('item')) {
                setTimeout(() => playSe(assets.itemSe, config.itemSeVolume), 30);
                ent.remove(); state.scoreRaw += 500;
                if (!state.isFever) { state.feverGauge = Math.min(100, state.feverGauge + 10); if (state.feverGauge >= 100) startFever(); }
            } else {
                const stompable = ent.classList.contains('stompEnemy') || ent.classList.contains('flyEnemy') || ent.classList.contains('obstacle');
                if (stompable) {
                    const isFalling = state.velocityY > 0;
                    const pBottom = pRect.bottom - hitMargin;
                    const eTopLimit = ent.classList.contains('flyEnemy') ? eRect.top + 35 : eRect.top + 20;
                    if (isFalling && pBottom < eTopLimit + 20) {
                        playSe(assets.stompSe, config.stompSeVolume);
                        createStompEffect(eRect.left + eRect.width/2, eRect.top);
                        state.stompCount++;
                        ent.remove(); state.scoreRaw += 500; state.velocityY = config.stompBouncePower; state.jumps = 1;
                        if (!state.isFever) state.feverGauge = Math.min(100, state.feverGauge + 5);
                    } else if (!state.isFever) { triggerMiss(); return; }
                }
            }
        }
        if (x < -200) ent.remove();
    }
}

function handleInput() {
    if (currentState !== GameState.PLAYING || state.isMissed || state.jumps >= 2) return;
    if (state.jumps === 1) {
        if (spinTimeoutId) clearTimeout(spinTimeoutId);
        el.player.classList.remove('player-spin-anim'); void el.player.offsetWidth;
        el.player.classList.add('player-spin-anim');
        spinTimeoutId = setTimeout(() => el.player.classList.remove('player-spin-anim'), 360);
    }
    state.velocityY = config.jumpPower; state.jumps++;
    setPlayerImage('playerJump');
}

function setPlayerImage(key) {
    if (currentPlayerImageKey === key) return;
    let nextAsset = (loadedAssets[key] && loadedAssets[key] instanceof Image) ? loadedAssets[key] : (loadedAssets['player'] instanceof Image ? loadedAssets['player'] : null);
    if (!nextAsset) return;
    const target = (currentImgTag === 'main') ? el.playerImgSub : el.playerImgMain;
    const old = (currentImgTag === 'main') ? el.playerImgMain : el.playerImgSub;
    target.src = nextAsset.src; target.style.opacity = 1; old.style.opacity = 0;
    currentImgTag = (currentImgTag === 'main') ? 'sub' : 'main';
    currentPlayerImageKey = key;
}

function createStompEffect(x, y) {
    const colors = ['#fff', '#ff0', '#0ff'];
    for (let i = 0; i < 3; i++) {
        const fx = document.createElement('div');
        fx.className = 'stomp-effect'; fx.textContent = '★';
        fx.style.color = colors[Math.floor(Math.random() * colors.length)];
        fx.style.left = (x + (Math.random()-0.5)*40) + 'px'; fx.style.top = (y + (Math.random()-0.5)*30) + 'px';
        el.container.appendChild(fx); setTimeout(() => fx.remove(), 400);
    }
}

function triggerMiss() {
    if (state.isMissed) return;
    state.isMissed = true;
    setPlayerImage('playerMiss');
    playSe(assets.missSe, config.missSeVolume);
    if (gameBgm) gameBgm.volume = config.bgmVolume * 0.2;
    el.player.classList.remove('player-spin-anim');
    state.velocityY = -12;
    setTimeout(() => {
        if (bgmFadeInterval) clearInterval(bgmFadeInterval);
        currentState = GameState.GAMEOVER;
        showResult();
    }, 800);
}

function startFever() {
    if (feverTimeoutId) clearTimeout(feverTimeoutId);
    state.isFever = true; el.container.classList.add('fever-mode');
    feverTimeoutId = setTimeout(() => {
        if (currentState !== GameState.PLAYING) return;
        state.isFever = false; state.feverGauge = 0; el.container.classList.remove('fever-mode');
    }, config.feverDuration);
}

function showResult() {
    if (gameBgm) { gameBgm.pause(); gameBgm.currentTime = 0; }
    if (animationId) cancelAnimationFrame(animationId);
    const isVal = state.playTime >= 5 && state.scoreRaw >= 1000 && state.stompCount > 0;
    let total = 45 + Math.floor(Math.random()*5);
    let skill = { technique: 40, attack: 40, jump: 40, ruby: 40 };
    if (isVal) {
        skill.technique = Math.min(100, 60 + state.stompCount * 2); skill.attack = Math.min(100, 50 + state.stompCount * 3);
        skill.jump = Math.min(100, 60 + (state.playTime * 1.2)); skill.ruby = Math.min(100, 50 + Math.floor(state.scoreRaw / 500));
        const raw = Math.round(skill.technique*0.25 + skill.attack*0.25 + skill.jump*0.25 + skill.ruby*0.25);
        total = Math.round(raw);
        if (raw >= 80 && raw <= 95) {
            const b = Math.random(); if (b < 0.5) total = 89; else if (b < 0.7) total = 88; else if (b < 0.9) total = 90;
        }
        if (raw > 95) total = (state.playTime > 50) ? 100 : 95 + Math.floor(Math.random()*3);
    }
    el.titleScreen.style.display = 'none'; el.resultScreen.style.display = 'block'; el.overlay.style.display = 'flex';
    document.getElementById('res-tech').textContent = "テクニック：" + Math.round(skill.technique) + "点";
    document.getElementById('res-attack').textContent = "アタック：" + Math.round(skill.attack) + "点";
    document.getElementById('res-jump').textContent = "ジャンプ：" + Math.round(skill.jump) + "点";
    document.getElementById('res-ruby').textContent = "るびぃゲット：" + Math.round(skill.ruby) + "点";
    const resTotal = document.getElementById('res-total');
    resTotal.textContent = "TOTAL：" + Math.round(total) + "点";
    resTotal.style.color = (Math.round(total) === 100) ? "#ffd700" : "#ffeb3b";
    if (total >= 95) resTotal.textContent += " ★EXCELLENT★";
    if (Math.round(total) === 100) resTotal.textContent = "TOTAL：100点 ★PERFECT★";
}
</script>
